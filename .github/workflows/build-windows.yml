name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependências
        run: |
          pip install flask supabase playwright openpyxl pyinstaller
          playwright install chromium --with-deps

      - name: Compilar executável
        run: pyinstaller robo_upseller.spec

      - name: Upload executável
        uses: actions/upload-artifact@v4
        with:
          name: RoboUpSeller-Windows
          path: dist/RoboUpSeller/
          retention-days: 30
